<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3YC AFRICANAS — Sistema de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root{--accent:#6366f1;--accent2:#06b6d4;--accent3:#f59e0b;--success:#10b981;--danger:#ef4444;--bg:#f1f5f9;--sidebar-bg:#0f172a;--sidebar-w:260px;--card-bg:#ffffff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--shadow-lg:0 8px 32px rgba(99,102,241,.12);--radius:16px;--transition:all .25s cubic-bezier(.4,0,.2,1)}
        body.dark{--bg:#0f172a;--card-bg:#1e293b;--text:#f1f5f9;--text-muted:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);transition:var(--transition);overflow-x:hidden}
        .sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;z-index:100;transition:var(--transition);overflow:hidden}
        .sidebar.collapsed{width:72px}
        .sidebar-logo{padding:24px 20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
        .logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
        .logo-text{font-family:'Syne',sans-serif;font-size:17px;color:#fff;white-space:nowrap;overflow:hidden}
        .logo-text span{color:var(--accent2)}
        .sidebar-user{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
        .user-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
        .u-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .u-role{font-size:10.5px;color:rgba(255,255,255,.35);margin:0}
        .nav-section{padding:14px 10px 8px;flex:1;overflow-y:auto}
        .nav-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:rgba(255,255,255,.22);padding:0 8px 6px;text-transform:uppercase}
        .nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;transition:var(--transition);white-space:nowrap;border:none;background:none;width:100%;text-align:left}
        .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
        .nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.28),rgba(6,182,212,.12));color:#fff}
        .nav-item.active .n-icon{color:var(--accent2)}
        .n-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
        .n-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px}
        .sidebar-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06)}
        .logout-btn{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.35);font-size:13px;font-weight:500;transition:var(--transition);border:none;background:none;width:100%}
        .logout-btn:hover{background:rgba(239,68,68,.12);color:#ef4444}
        .main{margin-left:var(--sidebar-w);min-height:100vh;transition:var(--transition);display:flex;flex-direction:column}
        .main.expanded{margin-left:72px}
        .topbar{position:sticky;top:0;z-index:50;background:var(--card-bg);border-bottom:1px solid var(--border);padding:0 22px;height:62px;display:flex;align-items:center;gap:14px}
        .toggle-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:15px;flex-shrink:0;transition:var(--transition)}
        .toggle-btn:hover{background:var(--bg)}
        .search-wrap{flex:1;max-width:440px;position:relative}
        .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px}
        .search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:var(--transition);font-family:'Plus Jakarta Sans',sans-serif}
        .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .topbar-actions{display:flex;align-items:center;gap:6px;margin-left:auto}
        .tb-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;transition:var(--transition);position:relative}
        .tb-btn:hover{background:var(--bg);color:var(--text)}
        .tb-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--card-bg)}
        .content{padding:22px;flex:1}
        .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
        .kpi{background:var(--card-bg);border-radius:14px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:var(--transition)}
        .kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
        .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
        .kpi:nth-child(1)::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
        .kpi:nth-child(2)::before{background:linear-gradient(90deg,var(--success),#34d399)}
        .kpi:nth-child(3)::before{background:linear-gradient(90deg,var(--accent3),#fbbf24)}
        .kpi:nth-child(4)::before{background:linear-gradient(90deg,var(--danger),#f87171)}
        .kpi-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:12px}
        .kpi:nth-child(1) .kpi-ico{background:rgba(99,102,241,.1);color:var(--accent)}
        .kpi:nth-child(2) .kpi-ico{background:rgba(16,185,129,.1);color:var(--success)}
        .kpi:nth-child(3) .kpi-ico{background:rgba(245,158,11,.1);color:var(--accent3)}
        .kpi:nth-child(4) .kpi-ico{background:rgba(239,68,68,.1);color:var(--danger)}
        .kpi-val{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;line-height:1;margin-bottom:3px}
        .kpi-lbl{font-size:12px;color:var(--text-muted);font-weight:500}
        .kpi-sub{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:3px;color:var(--text-muted)}
        .kpi-sub.up{color:var(--success)}
        .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}
        .card{background:var(--card-bg);border-radius:14px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
        .card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .card-ttl{font-size:14px;font-weight:700}
        .card-bdg{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;background:rgba(99,102,241,.08);color:var(--accent)}
        .tcard{background:var(--card-bg);border-radius:14px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px}
        .dtable{width:100%;border-collapse:collapse;font-size:13px}
        .dtable thead th{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);padding:7px 10px;border-bottom:1px solid var(--border);background:var(--bg);text-align:left}
        .dtable thead th:first-child{border-radius:7px 0 0 7px}
        .dtable thead th:last-child{border-radius:0 7px 7px 0}
        .dtable tbody tr{border-bottom:1px solid var(--border);transition:var(--transition)}
        .dtable tbody tr:last-child{border-bottom:none}
        .dtable tbody tr:hover{background:var(--bg)}
        .dtable td{padding:11px 10px;vertical-align:middle}
        .bs{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
        .bs::before{content:'';width:5px;height:5px;border-radius:50%}
        .bs-p{background:rgba(245,158,11,.1);color:var(--accent3)}.bs-p::before{background:var(--accent3)}
        .bs-r{background:rgba(99,102,241,.1);color:var(--accent)}.bs-r::before{background:var(--accent)}
        .bs-c{background:rgba(16,185,129,.1);color:var(--success)}.bs-c::before{background:var(--success)}
        .bs-x{background:rgba(239,68,68,.1);color:var(--danger)}.bs-x::before{background:var(--danger)}
        .b-ok{background:rgba(16,185,129,.1);color:var(--success);padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600}
        .b-low{background:rgba(239,68,68,.1);color:var(--danger);padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600}
        .bi-btn{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:var(--transition)}
        .bi-e{background:rgba(99,102,241,.08);color:var(--accent)}.bi-e:hover{background:rgba(99,102,241,.18)}
        .bi-d{background:rgba(239,68,68,.08);color:var(--danger)}.bi-d:hover{background:rgba(239,68,68,.18)}
        .bi-v{background:rgba(6,182,212,.08);color:var(--accent2)}.bi-v:hover{background:rgba(6,182,212,.18)}
        .bi-a{background:rgba(16,185,129,.08);color:var(--success)}.bi-a:hover{background:rgba(16,185,129,.18)}
        .btn-p{padding:8px 16px;border-radius:9px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:var(--transition);font-family:'Plus Jakarta Sans',sans-serif}
        .btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.28)}
        .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
        .spin-w{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:10px}
        .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .fade-in{animation:fi .35s ease}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .toast-3yc{position:fixed;bottom:22px;right:22px;z-index:9999;padding:11px 16px;border-radius:11px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.14);animation:fi .3s ease;max-width:300px}
        .stock-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
        .sb-fill{height:100%;border-radius:2px;transition:width .5s ease}
        .sb-ok{background:var(--success)}.sb-low{background:var(--danger)}
        .rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
        .rank-item:last-child{border-bottom:none}
        .rn{width:22px;height:22px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-muted);flex-shrink:0}
        .rn.g{background:rgba(245,158,11,.12);color:var(--accent3)}
        .rn.s{background:rgba(148,163,184,.12);color:#94a3b8}
        .rn.b{background:rgba(217,119,6,.12);color:#d97706}
        .modal-content{background:var(--card-bg);border:1px solid var(--border);border-radius:14px}
        .modal-header{border-bottom:1px solid var(--border);padding:18px 22px}
        .modal-body{padding:18px 22px}
        .modal-footer{border-top:1px solid var(--border);padding:14px 22px}
        .modal-title{font-size:15px;font-weight:700}
        .form-control,.form-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:8px 12px}
        .form-control:focus,.form-select:focus{background:var(--bg);color:var(--text);border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .form-label{font-size:12.5px;font-weight:600;margin-bottom:5px}
        body.dark .search-wrap input{background:rgba(255,255,255,.05)}
        body.dark .dtable thead th{background:rgba(255,255,255,.03)}
        body.dark .dtable tbody tr:hover{background:rgba(255,255,255,.03)}
        body.dark .form-control,body.dark .form-select{background:rgba(255,255,255,.05)}
        body.dark .btn-close{filter:invert(1)}
        @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:860px){.charts-row{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0!important}.kpi-grid{grid-template-columns:1fr 1fr}}

        @media print {
            .sidebar, .topbar, .btn-p, .bi-btn, .modal-footer button:not(.btn-p),
            #relFim, #relInicio, label.form-label, .tcard > .card-hdr button { display:none !important; }
            body { background:#fff !important; color:#000 !important; }
            .main { margin-left:0 !important; }
            .content { padding:0 !important; }
            .kpi, .tcard, .modal-content { border:1px solid #ddd !important; background:#fff !important; box-shadow:none !important; }
            .kpi-val, .card-ttl { color:#000 !important; }
            .kpi-lbl, .u-role { color:#666 !important; }
            .dtable th, .dtable td { color:#000 !important; border-color:#ddd !important; }
            .dtable thead th { background:#f5f5f5 !important; }
            .modal { position:static !important; display:block !important; }
            .modal-dialog { max-width:100% !important; margin:0 !important; }
            .modal-content { border-radius:0 !important; }
            #faturaImprimir, #relatorioImprimivel { display:block !important; }
        }
    </style>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon"><i class="fas fa-wrench"></i></div>
        <div class="logo-text"><span>3YC</span> AFRICANAS</div>
    </div>
    <div class="sidebar-user">
        <div class="user-av" id="userAvatar">AD</div>
        <div style="overflow:hidden">
            <div class="u-name" id="userName">Carregando...</div>
            <p class="u-role" id="userType">...</p>
        </div>
    </div>
    <div class="nav-section">
        <div class="nav-label">Principal</div>
        <button class="nav-item active" data-action="dashboard" onclick="ir('dashboard',this)"><i class="n-icon fas fa-chart-pie"></i><span>Dashboard</span></button>
        <button class="nav-item" data-action="clientes" onclick="ir('clientes',this)"><i class="n-icon fas fa-users"></i><span>Clientes</span></button>
        <button class="nav-item" data-action="veiculos" onclick="ir('veiculos',this)"><i class="n-icon fas fa-car"></i><span>Veículos</span></button>
        <div class="nav-label mt-3">Operações</div>
        <button class="nav-item" data-action="funcionarios" onclick="ir('funcionarios',this)" id="navFunc"><i class="n-icon fas fa-hard-hat"></i><span>Funcionários</span></button>
        <button class="nav-item" data-action="ordens" onclick="ir('ordens',this)"><i class="n-icon fas fa-clipboard-list"></i><span>Ordens de Serviço</span></button>
        <button class="nav-item" data-action="estoque" onclick="ir('estoque',this)"><i class="n-icon fas fa-boxes"></i><span>Estoque</span><span class="n-badge" id="sbadge" style="display:none">!</span></button>
        <div class="nav-label mt-3">Financeiro</div>
        <button class="nav-item" data-action="pagamentos" onclick="ir('pagamentos',this)" id="navPag"><i class="n-icon fas fa-credit-card"></i><span>Pagamentos</span></button>
        <button class="nav-item" data-action="faturas" onclick="ir('faturas',this)" id="navFat"><i class="n-icon fas fa-file-invoice-dollar"></i><span>Faturas</span></button>
        <button class="nav-item" data-action="relatorios" onclick="ir('relatorios',this)" id="navRel"><i class="n-icon fas fa-chart-bar"></i><span>Relatórios</span></button>
        <div class="nav-label mt-3">Sistema</div>
        <button class="nav-item" data-action="usuarios" onclick="ir('usuarios',this)" id="navUsers"><i class="n-icon fas fa-user-cog"></i><span>Usuários</span></button>
    </div>
    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()"><i class="n-icon fas fa-sign-out-alt"></i><span>Sair</span></button>
    </div>
</aside>
<div class="main" id="main">
    <div class="topbar">
        <button class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar clientes, veículos, ordens..." oninput="pesquisar(this.value)" autocomplete="off">
        </div>
        <div class="topbar-actions">
            <button class="tb-btn" onclick="toggleTheme()" title="Modo noturno"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="tb-btn" onclick="verNotif()" title="Notificações"><i class="fas fa-bell"></i><span class="tb-dot" id="notifDot" style="display:none"></span></button>
        </div>
    </div>
    <div class="content" id="pg">
        <div class="spin-w"><div class="spinner"></div><p style="color:var(--text-muted);font-size:12.5px">A carregar...</p></div>
    </div>
</div>

<!-- MODAIS -->
<div class="modal fade" id="mCliente" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="mClienteTtl">Novo Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><input type="hidden" id="cId">
        <div class="mb-3"><label class="form-label">Nome *</label><input type="text" class="form-control" id="cNome" required></div>
        <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" id="cEmail" required></div>
        <div class="mb-3"><label class="form-label">Telefone *</label><input type="text" class="form-control" id="cTel" required></div>
        <div class="mb-3"><label class="form-label">Endereço</label><input type="text" class="form-control" id="cEnd"></div>
        <div class="mb-3"><label class="form-label">NIF/BI</label><input type="text" class="form-control" id="cBI"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn-p" onclick="saveCliente()"><i class="fas fa-save"></i> Salvar</button></div>
</div></div></div>

<div class="modal fade" id="mVeiculo" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="mVeiculoTtl">Novo Veículo</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><input type="hidden" id="vId">
        <div class="mb-3"><label class="form-label">Cliente *</label><select class="form-select" id="vCliId" required></select></div>
        <div class="row"><div class="col mb-3"><label class="form-label">Placa *</label><input type="text" class="form-control" id="vPlaca" required></div><div class="col mb-3"><label class="form-label">Modelo *</label><input type="text" class="form-control" id="vModelo" required></div></div>
        <div class="row"><div class="col mb-3"><label class="form-label">Ano</label><input type="number" class="form-control" id="vAno" min="1990" max="2030"></div><div class="col mb-3"><label class="form-label">Cor</label><input type="text" class="form-control" id="vCor"></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn-p" onclick="saveVeiculo()"><i class="fas fa-save"></i> Salvar</button></div>
</div></div></div>

<div class="modal fade" id="mFunc" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="mFuncTtl">Novo Funcionário</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><input type="hidden" id="fId">
        <div class="mb-3"><label class="form-label">Nome *</label><input type="text" class="form-control" id="fNome" required></div>
        <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" id="fEmail" required></div>
        <div class="mb-3"><label class="form-label">Telefone *</label><input type="text" class="form-control" id="fTel" required></div>

    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn-p" onclick="saveAjuste()"><i class="fas fa-check"></i> Confirmar</button></div>

        <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" id="uEmail" required></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
const fmt=(v)=>new Intl.NumberFormat('pt-AO').format(v||0);
let graficos={},userAtual=null;

// INIT
document.addEventListener('DOMContentLoaded',async()=>{
    const raw=sessionStorage.getItem('usuarioLogado');
    if(!raw){window.location.href='index.html';return;}
    userAtual=JSON.parse(raw);
    document.getElementById('userName').textContent=userAtual.nome;
    document.getElementById('userAvatar').textContent=userAtual.avatar||userAtual.nome?.charAt(0).toUpperCase();
    const tipos={admin:'Administrador',funcionario:'Funcionário',cliente:'Cliente'};
    document.getElementById('userType').textContent=tipos[userAtual.tipo]||userAtual.tipo;
    if(localStorage.getItem('tema')==='dark'){document.body.classList.add('dark');document.getElementById('themeIcon').className='fas fa-sun';}
    if(userAtual.tipo==='cliente'){
        // Cliente só vê: Dashboard, Meus Veículos, Minhas Ordens
        ['navFunc','navUsers','navPag','navFat','navRel'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
        // Esconder também clientes, funcionários, estoque, usuários do menu geral
        document.querySelectorAll('.nav-item').forEach(btn=>{
            const a=btn.getAttribute('data-action');
            if(['clientes','funcionarios','estoque','usuarios','pagamentos','faturas','relatorios'].includes(a))btn.style.display='none';
        });
    } else if(userAtual.tipo==='funcionario'){
        // Funcionário vê: Dashboard, Ordens, Estoque (sem clientes, usuários, pagamentos, relatórios admin)
        ['navUsers','navPag','navFat','navRel'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
        document.querySelectorAll('.nav-item').forEach(btn=>{
            const a=btn.getAttribute('data-action');
            if(['clientes','usuarios','pagamentos','faturas','relatorios'].includes(a))btn.style.display='none';
        });
    }
    await load('dashboard');
    checkStock();
});

// NAV
async function ir(a,el){
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    if(el)el.classList.add('active');
    await load(a);
}
window.ir=ir;

async function load(a){
    const pg=document.getElementById('pg');
    pg.innerHTML='<div class="spin-w"><div class="spinner"></div><p style="color:var(--text-muted);font-size:12.5px">A carregar...</p></div>';
    try{
        switch(a){
            case'dashboard':await pgDash();break;
            case'clientes':await pgClientes();break;
            case'veiculos':await pgVeiculos();break;
            case'funcionarios':await pgFuncionarios();break;
            case'ordens':await pgOrdens();break;
            case'estoque':await pgEstoque();break;
            case'usuarios':await pgUsuarios();break;
            case'pagamentos':await pgPagamentos();break;
            case'faturas':await pgFaturas();break;
            case'relatorios':await pgRelatorios();break;
            default:pg.innerHTML='<div style="padding:30px;color:var(--text-muted)">Em desenvolvimento.</div>';
        }
    }catch(err){pg.innerHTML=`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px 18px;color:var(--danger);font-size:13px"><i class="fas fa-exclamation-triangle me-2"></i>Erro: ${err.message}</div>`;}
}

// SIDEBAR
function toggleSidebar(){const s=document.getElementById('sidebar');const m=document.getElementById('main');s.classList.toggle('collapsed');m.classList.toggle('expanded');}
window.toggleSidebar=toggleSidebar;

// TEMA
function toggleTheme(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');localStorage.setItem('tema',d?'dark':'light');document.getElementById('themeIcon').className=d?'fas fa-sun':'fas fa-moon';Object.values(graficos).forEach(g=>g?.destroy());graficos={};if(document.querySelector('[data-action="dashboard"].active'))setTimeout(()=>load('dashboard'),80);}
window.toggleTheme=toggleTheme;

// NOTIFICAÇÕES
async function checkStock(){try{const a=await API.Produtos.alertas();const t=Array.isArray(a)?a.length:0;if(t>0){document.getElementById('notifDot').style.display='block';const b=document.getElementById('sbadge');if(b){b.textContent=t;b.style.display='inline';}}}catch(_){}}
async function verNotif(){try{const a=await API.Produtos.alertas();const t=Array.isArray(a)?a.length:0;if(t===0){toast('Sem notificações!','success');return;}toast(`${t} produto(s) com estoque baixo!`,'warning');setTimeout(()=>ir('estoque',document.querySelector('[data-action="estoque"]')),700);}catch(_){toast('Erro','error');}}
window.verNotif=verNotif;

// PESQUISA
let sTimer;
function pesquisar(termo){clearTimeout(sTimer);if(!termo||termo.length<2)return;sTimer=setTimeout(async()=>{const pg=document.getElementById('pg');pg.innerHTML='<div class="spin-w"><div class="spinner"></div></div>';try{const[cl,vl,ol]=await Promise.all([API.Clientes.listar(termo).catch(()=>[]),API.Veiculos.listar(termo).catch(()=>[]),API.Ordens.listar({busca:termo}).catch(()=>[])]);pg.innerHTML=`<h5 class="mb-4 fade-in">Resultados para "<strong>${termo}</strong>"</h5>${cl.length?`<div class="tcard fade-in mb-3"><div class="card-hdr"><span class="card-ttl"><i class="fas fa-users me-2" style="color:var(--accent)"></i>Clientes</span><span class="card-bdg">${cl.length}</span></div><table class="dtable"><thead><tr><th>Nome</th><th>Email</th><th>Telefone</th></tr></thead><tbody>${cl.map(c=>`<tr><td>${c.nome}</td><td>${c.email}</td><td>${c.telefone||'-'}</td></tr>`).join('')}</tbody></table></div>`:''} ${vl.length?`<div class="tcard fade-in mb-3"><div class="card-hdr"><span class="card-ttl"><i class="fas fa-car me-2" style="color:var(--success)"></i>Veículos</span><span class="card-bdg">${vl.length}</span></div><table class="dtable"><thead><tr><th>Placa</th><th>Modelo</th><th>Cliente</th></tr></thead><tbody>${vl.map(v=>`<tr><td>${v.placa}</td><td>${v.modelo||'-'}</td><td>${v.cliente_nome||'-'}</td></tr>`).join('')}</tbody></table></div>`:''} ${ol.length?`<div class="tcard fade-in mb-3"><div class="card-hdr"><span class="card-ttl"><i class="fas fa-clipboard-list me-2" style="color:var(--accent3)"></i>Ordens</span><span class="card-bdg">${ol.length}</span></div><table class="dtable"><thead><tr><th>Código</th><th>Cliente</th><th>Status</th><th>Valor</th></tr></thead><tbody>${ol.map(o=>`<tr><td>${o.codigo||('#'+o.id)}</td><td>${o.cliente_nome||'-'}</td><td>${bs(o.status)}</td><td>${fmt(o.valor_total)} Kz</td></tr>`).join('')}</tbody></table></div>`:''} ${!cl.length&&!vl.length&&!ol.length?'<div style="padding:20px;color:var(--text-muted);text-align:center">Nenhum resultado encontrado.</div>':''}`;}catch(e){toast('Erro na pesquisa','error');}},500);}
window.pesquisar=pesquisar;

// LOGOUT
async function logout(){try{await API.Auth.logout();}catch(_){}sessionStorage.removeItem('usuarioLogado');window.location.href='index.html';}
window.logout=logout;

// TOAST
function toast(msg,tipo='info'){document.querySelector('.toast-3yc')?.remove();const cores={success:'#10b981',error:'#ef4444',warning:'#f59e0b',info:'#6366f1'};const ic={success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};const t=document.createElement('div');t.className='toast-3yc';t.style.background=cores[tipo]||cores.info;t.innerHTML=`<i class="fas ${ic[tipo]||ic.info}"></i> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
window.mostrarToast=toast;

// STATUS BADGE
function bs(s){const m={pending:['bs bs-p','Pendente'],progress:['bs bs-r','Em Andamento'],completed:['bs bs-c','Concluída'],cancelled:['bs bs-x','Cancelada']};const[c,t]=m[s]||['bs','?'];return`<span class="${c}">${t}</span>`;}

// ── DASHBOARD ──────────────────────────────────────────────

// ── DASHBOARD FUNCIONÁRIO ──────────────────────────────────
async function pgDashFuncionario(){
    const pg=document.getElementById('pg');
    // Buscar ordens do funcionário pelo email
    const todasOrdens=await API.Ordens.listar().catch(()=>[]);
    const minhasOrdens=Array.isArray(todasOrdens)?todasOrdens.filter(o=>o.funcionario_nome&&o.funcionario_nome===userAtual.nome):[];
    const ativas=minhasOrdens.filter(o=>['pending','progress'].includes(o.status));
    const concluidas=minhasOrdens.filter(o=>o.status==='completed');
    const totalVal=concluidas.reduce((s,o)=>s+(parseFloat(o.valor_total)||0),0);

    pg.innerHTML=`
    <div class="fade-in">
        <div style="margin-bottom:20px">
            <h4 style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px">Olá, ${userAtual.nome}! 👋</h4>
            <p style="color:var(--text-muted);font-size:13px">Aqui estão as suas ordens de serviço</p>
        </div>
        <div class="kpi-grid fade-in" style="grid-template-columns:repeat(3,1fr)">
            <div class="kpi"><div class="kpi-ico"><i class="fas fa-clipboard-list"></i></div><div class="kpi-val">${minhasOrdens.length}</div><div class="kpi-lbl">Total de Ordens</div></div>
            <div class="kpi"><div class="kpi-ico" style="background:rgba(245,158,11,.1);color:var(--accent3)"><i class="fas fa-spinner"></i></div><div class="kpi-val">${ativas.length}</div><div class="kpi-lbl">Em Andamento</div></div>
            <div class="kpi"><div class="kpi-ico" style="background:rgba(16,185,129,.1);color:var(--success)"><i class="fas fa-check-double"></i></div><div class="kpi-val">${concluidas.length}</div><div class="kpi-lbl">Concluídas</div></div>
        </div>
        <div class="tcard fade-in mt-3">
            <div class="card-hdr"><span class="card-ttl"><i class="fas fa-tasks me-2" style="color:var(--accent)"></i>Minhas Ordens Activas</span>
            <button class="btn-p" style="padding:6px 12px;font-size:11.5px" onclick="ir('ordens',document.querySelector('[data-action=ordens]'))">Ver todas</button></div>
            <table class="dtable"><thead><tr><th>Código</th><th>Cliente</th><th>Veículo</th><th>Placa</th><th>Status</th><th>Valor (Kz)</th><th>Ações</th></tr></thead>
            <tbody>${ativas.length?ativas.map(o=>`<tr>
                <td><strong style="color:var(--accent)">${o.codigo}</strong></td>
                <td>${o.cliente_nome}</td>
                <td>${o.veiculo_modelo||'-'}</td>
                <td style="color:var(--text-muted)">${o.placa||'-'}</td>
                <td>${bs(o.status)}</td>
                <td><strong>${fmt(o.valor_total)}</strong></td>
                <td>
                    <button class="bi-btn bi-a me-1" onclick="atualizarOS(${o.id},'progress')" title="Em Andamento"><i class="fas fa-play"></i></button>
                    <button class="bi-btn bi-v" onclick="atualizarOS(${o.id},'completed')" title="Concluir"><i class="fas fa-check"></i></button>
                </td>
            </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Nenhuma ordem activa atribuída</td></tr>'}</tbody>
            </table>
        </div>
    </div>`;
}
window.pgDashFuncionario=pgDashFuncionario;

async function atualizarOS(id,status){
    try{await API.Ordens.atualizar(id,{status});toast(status==='completed'?'✅ OS concluída!':'OS actualizada!','success');await pgDashFuncionario();}
    catch(e){toast(e.message,'error');}
}
window.atualizarOS=atualizarOS;

// ── DASHBOARD CLIENTE ──────────────────────────────────────
async function pgDashCliente(){
    const pg=document.getElementById('pg');
    // Buscar veículos e ordens do cliente pelo email
    const [todosVeiculos,todasOrdens]=await Promise.all([
        API.Veiculos.listar().catch(()=>[]),
        API.Ordens.listar().catch(()=>[])
    ]);
    // Filtrar pelo email do cliente logado
    const meusVeiculos=Array.isArray(todosVeiculos)?todosVeiculos:[];
    const minhasOrdens=Array.isArray(todasOrdens)?todasOrdens.filter(o=>o.cliente_nome&&o.cliente_nome===userAtual.nome):[];
    const ordensActivas=minhasOrdens.filter(o=>['pending','progress'].includes(o.status));
    const totalGasto=minhasOrdens.filter(o=>o.status==='completed').reduce((s,o)=>s+(parseFloat(o.valor_total)||0),0);

    pg.innerHTML=`
    <div class="fade-in">
        <div style="margin-bottom:20px">
            <h4 style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px">Olá, ${userAtual.nome}! 👋</h4>
            <p style="color:var(--text-muted);font-size:13px">Acompanhe os seus veículos e ordens de serviço</p>
        </div>
        <div class="kpi-grid fade-in" style="grid-template-columns:repeat(3,1fr)">
            <div class="kpi"><div class="kpi-ico"><i class="fas fa-car"></i></div><div class="kpi-val">${meusVeiculos.length}</div><div class="kpi-lbl">Meus Veículos</div></div>
            <div class="kpi"><div class="kpi-ico" style="background:rgba(245,158,11,.1);color:var(--accent3)"><i class="fas fa-clock"></i></div><div class="kpi-val">${ordensActivas.length}</div><div class="kpi-lbl">Ordens Activas</div></div>
            <div class="kpi"><div class="kpi-ico" style="background:rgba(99,102,241,.1);color:var(--accent)"><i class="fas fa-coins"></i></div><div class="kpi-val" style="font-size:17px">${fmt(totalGasto)}</div><div class="kpi-lbl">Total Gasto (Kz)</div></div>
        </div>
        <div class="row g-3 fade-in mt-2">
            <div class="col-md-5">
                <div class="tcard">
                    <div class="card-hdr"><span class="card-ttl"><i class="fas fa-car me-2" style="color:var(--accent)"></i>Meus Veículos</span></div>
                    ${meusVeiculos.length?meusVeiculos.map(v=>`
                    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
                        <div style="width:38px;height:38px;border-radius:10px;background:rgba(99,102,241,.1);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:16px;flex-shrink:0"><i class="fas fa-car"></i></div>
                        <div style="flex:1;min-width:0">
                            <div style="font-size:13px;font-weight:600">${v.modelo}</div>
                            <div style="font-size:11px;color:var(--text-muted)">${v.placa} • ${v.cor||''} ${v.ano?'• '+v.ano:''}</div>
                        </div>
                        <span class="${v.status==='Em oficina'?'bs bs-r':'bs bs-c'}">${v.status}</span>
                    </div>`).join(''):'<p style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">Nenhum veículo registado</p>'}
                </div>
            </div>
            <div class="col-md-7">
                <div class="tcard">
                    <div class="card-hdr"><span class="card-ttl"><i class="fas fa-clipboard-list me-2" style="color:var(--accent)"></i>Minhas Ordens de Serviço</span></div>
                    <table class="dtable"><thead><tr><th>Código</th><th>Veículo</th><th>Status</th><th>Data</th><th>Valor (Kz)</th></tr></thead>
                    <tbody>${minhasOrdens.length?minhasOrdens.map(o=>`<tr>
                        <td><strong style="color:var(--accent)">${o.codigo}</strong></td>
                        <td>${o.veiculo_modelo||'-'} <span style="color:var(--text-muted)">${o.placa||''}</span></td>
                        <td>${bs(o.status)}</td>
                        <td style="color:var(--text-muted)">${o.data_entrada||'-'}</td>
                        <td><strong>${fmt(o.valor_total)}</strong></td>
                    </tr>`).join(''):'<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Nenhuma ordem de serviço</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>`;
}
window.pgDashCliente=pgDashCliente;

async function pgDash(){
    if(userAtual.tipo==='cliente'){await pgDashCliente();return;}
    if(userAtual.tipo==='funcionario'){await pgDashFuncionario();return;}
    const d=await API.Dashboard.admin();
    const c=d.cards||{};
    const pg=document.getElementById('pg');
    pg.innerHTML=`
    <div class="kpi-grid fade-in">
        <div class="kpi"><div class="kpi-ico"><i class="fas fa-users"></i></div><div class="kpi-val">${c.total_clientes||0}</div><div class="kpi-lbl">Total Clientes</div><div class="kpi-sub up"><i class="fas fa-car" style="font-size:9px"></i> ${c.total_veiculos||0} veículos</div></div>
        <div class="kpi"><div class="kpi-ico"><i class="fas fa-clipboard-list"></i></div><div class="kpi-val">${(c.ordens_pendentes||0)+(c.ordens_andamento||0)}</div><div class="kpi-lbl">Ordens Abertas</div><div class="kpi-sub"><span style="color:var(--accent3);font-size:9px">●</span> ${c.ordens_pendentes||0} pendentes</div></div>
        <div class="kpi"><div class="kpi-ico"><i class="fas fa-check-double"></i></div><div class="kpi-val">${c.ordens_concluidas||0}</div><div class="kpi-lbl">Ordens Concluídas</div><div class="kpi-sub up"><i class="fas fa-trophy" style="font-size:9px"></i> Total acumulado</div></div>
        <div class="kpi"><div class="kpi-ico"><i class="fas fa-coins"></i></div><div class="kpi-val">${fmt(c.faturamento_mes)}</div><div class="kpi-lbl">Faturamento Mês (Kz)</div><div class="kpi-sub up"><i class="fas fa-chart-line" style="font-size:9px"></i> Total: ${fmt(c.faturamento_total)} Kz</div></div>

    const id=document.getElementById('pId').value;

function autoValor(sel){const opt=sel.options[sel.selectedIndex];const v=opt.getAttribute('data-v');if(v)document.getElementById('pValor').value=v;}

async function savePag(){
    const ordemId=document.getElementById('pOrdem').value;
    const valor=parseFloat(document.getElementById('pValor').value);
    if(!ordemId||!valor){toast('Selecione a OS e informe o valor!','error');return;}
    const sel=document.getElementById('pOrdem');
    const clienteId=sel.options[sel.selectedIndex].getAttribute('data-c');
    try{
        const r=await API.Pagamentos.criar({ordem_id:parseInt(ordemId),cliente_id:parseInt(clienteId),valor,metodo:document.getElementById('pMetodo').value,referencia:document.getElementById('pRef').value,notas:document.getElementById('pNotas').value,data_pagamento:new Date().toISOString().split('T')[0]});
        bootstrap.Modal.getInstance(document.getElementById('mPag'))?.hide();
        toast(`✅ Fatura gerada: ${r.fatura}`,'success');
        setTimeout(()=>ir('faturas',document.querySelector('[data-action="faturas"]')),1200);
    }catch(e){toast(e.message,'error');}
}
window.savePag=savePag;

async function verFatOrdem(ordemId){
    try{const r=await API.Faturas.listar();const l=Array.isArray(r)?r:[];const f=l.find(x=>x.ordem_id==ordemId);if(f)abrirFatura(f.id);else toast('Fatura não encontrada','warning');}
    catch(e){toast(e.message,'error');}
}
window.verFatOrdem=verFatOrdem;

                <div style="font-weight:700;font-size:13px;padding:8px 12px;background:rgba(6,182,212,.08);border-radius:7px;margin-bottom:8px;color:var(--accent2)"><i class="fas fa-cogs me-2"></i>PEÇAS</div>
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead><tr style="background:var(--bg)"><th style="padding:7px 10px;text-align:left;font-size:11px">PEÇA</th><th style="padding:7px 10px;text-align:center;font-size:11px">QTD</th><th style="padding:7px 10px;text-align:right;font-size:11px">UNIT. (Kz)</th><th style="padding:7px 10px;text-align:right;font-size:11px">TOTAL (Kz)</th></tr></thead>
                    <tbody>${f.pecas.map(p=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:9px 10px">${p.nome}</td><td style="padding:9px 10px;text-align:center">${p.quantidade}</td><td style="padding:9px 10px;text-align:right">${fmt(p.valor_unitario)}</td><td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(p.valor_total)}</td></tr>`).join('')}</tbody>
                </table>
            </div>`:''}
            <div style="display:flex;justify-content:flex-end;margin-top:8px">
                <div style="background:var(--bg);border-radius:12px;padding:16px 24px;min-width:260px;border:1px solid var(--border)">
                    <div style="display:flex;justify-content:space-between;margin-bottom:7px;font-size:13px"><span style="color:var(--text-muted)">Subtotal</span><span>${fmt(f.valor_subtotal)} Kz</span></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px"><span style="color:var(--text-muted)">IVA (14%)</span><span>${fmt(f.valor_iva)} Kz</span></div>
                    <div style="border-top:2px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;font-size:20px;font-weight:800"><span>TOTAL</span><span style="color:var(--accent)">${fmt(f.valor_total)} Kz</span></div>
                </div>
            </div>
            <div style="text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);color:var(--text-muted);font-size:11px">
                Obrigado pela preferência! • 3YC AFRICANAS • Luanda, Angola • NIF: 000000000
            </div>
        </div>`;
        new bootstrap.Modal(document.getElementById('mFat')).show();
    }catch(e){toast(e.message,'error');}
}
window.abrirFatura=abrirFatura;

async function printFatura(id){await abrirFatura(id);setTimeout(()=>window.print(),800);}
window.printFatura=printFatura;

// ══════════════════════════════════════════════════════
// RELATÓRIOS
// ══════════════════════════════════════════════════════
async function pgRelatorios(){
    const pg=document.getElementById('pg');
    const hoje=new Date().toISOString().split('T')[0];
    const ini=hoje.substring(0,7)+'-01';
    pg.innerHTML=`
    <div class="fade-in">
        <div style="margin-bottom:20px">
            <h4 style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px">📊 Relatórios</h4>
            <p style="color:var(--text-muted);font-size:13px">Gere relatórios completos e exporte em PDF</p>
        </div>
        <div class="tcard" style="margin-bottom:20px">
            <div class="card-hdr"><span class="card-ttl"><i class="fas fa-filter" style="color:var(--accent);margin-right:8px"></i>Período</span></div>
            <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end">
                <div><label class="form-label">Data Início</label><input type="date" class="form-control" id="rIni" value="${ini}"></div>
                <div><label class="form-label">Data Fim</label><input type="date" class="form-control" id="rFim" value="${hoje}"></div>
                <button class="btn-p" style="height:38px" onclick="gerarRel()"><i class="fas fa-chart-bar"></i> Gerar</button>
            </div>
        </div>
        <div id="relOut"><div style="text-align:center;padding:50px;color:var(--text-muted)"><i class="fas fa-chart-bar" style="font-size:40px;opacity:.15;display:block;margin-bottom:12px"></i>Selecione o período e clique em Gerar</div></div>
    </div>`;
}
window.pgRelatorios=pgRelatorios;

async function gerarRel(){
    const ini=document.getElementById('rIni').value;
    const fim=document.getElementById('rFim').value;
    const out=document.getElementById('relOut');
    if(!ini||!fim){toast('Selecione as datas!','error');return;}
    out.innerHTML='<div class="spin-w"><div class="spinner"></div></div>';
    try{
        const d=await API.Faturas.relatorio(ini,fim);
        const r=d.resumo||{};
        const ordens=Array.isArray(d.ordens)?d.ordens:[];
        const top=Array.isArray(d.top_clientes)?d.top_clientes:[];
        const est=Array.isArray(d.estoque_baixo)?d.estoque_baixo:[];
        out.innerHTML=`
        <div id="relPrint">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <div>
                    <h5 style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px">Relatório de Gestão</h5>
                    <p style="color:var(--text-muted);font-size:12px">Período: ${ini} a ${fim} • Gerado: ${d.gerado_em}</p>
                </div>
                <button class="btn-p" onclick="window.print()"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
            </div>
            <div class="kpi-grid" style="margin-bottom:18px">
                <div class="kpi"><div class="kpi-ico"><i class="fas fa-clipboard-list"></i></div><div class="kpi-val">${r.total_ordens||0}</div><div class="kpi-lbl">Total Ordens</div></div>
                <div class="kpi"><div class="kpi-ico" style="background:rgba(16,185,129,.1);color:var(--success)"><i class="fas fa-check"></i></div><div class="kpi-val">${r.ordens_concluidas||0}</div><div class="kpi-lbl">Concluídas</div></div>
                <div class="kpi"><div class="kpi-ico" style="background:rgba(245,158,11,.1);color:var(--accent3)"><i class="fas fa-spinner"></i></div><div class="kpi-val">${r.ordens_andamento||0}</div><div class="kpi-lbl">Em Andamento</div></div>
                <div class="kpi"><div class="kpi-ico" style="background:rgba(99,102,241,.1);color:var(--accent)"><i class="fas fa-coins"></i></div><div class="kpi-val" style="font-size:17px">${fmt(r.receita_total)}</div><div class="kpi-lbl">Receita (Kz)</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
                <div class="tcard">
                    <div class="card-hdr"><span class="card-ttl"><i class="fas fa-trophy" style="color:var(--accent3);margin-right:8px"></i>Top Clientes</span></div>
                    ${top.length?top.map((c,i)=>`<div class="rank-item"><div class="rn ${i===0?'g':i===1?'s':'b'}">${i+1}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${c.nome}</div><div style="font-size:11px;color:var(--text-muted)">${c.total_ordens} ordens</div></div><div style="font-size:13px;font-weight:700;color:var(--accent)">${fmt(c.valor_total)} Kz</div></div>`).join(''):'<p style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">Sem dados</p>'}
                </div>
                <div class="tcard">
                    <div class="card-hdr"><span class="card-ttl"><i class="fas fa-exclamation-triangle" style="color:var(--danger);margin-right:8px"></i>Estoque Crítico</span></div>
                    ${est.length?est.map(p=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:500">${p.nome}</div><div style="font-size:11px;color:var(--text-muted)">${p.categoria}</div></div><span class="b-low">${p.quantidade} un.</span></div>`).join(''):'<p style="text-align:center;padding:16px;color:var(--success);font-size:13px">✓ Estoque OK</p>'}
                </div>
            </div>
            <div class="tcard">
                <div class="card-hdr"><span class="card-ttl"><i class="fas fa-list" style="color:var(--accent);margin-right:8px"></i>Ordens do Período (${ordens.length})</span></div>
                <table class="dtable"><thead><tr><th>Código</th><th>Cliente</th><th>Veículo</th><th>Funcionário</th><th>Status</th><th>Entrada</th><th>Valor (Kz)</th></tr></thead>
                <tbody>${ordens.length?ordens.map(o=>`<tr>
                    <td><strong style="color:var(--accent)">${o.codigo}</strong></td>
                    <td>${o.cliente_nome}</td><td>${o.veiculo} <span style="color:var(--text-muted)">${o.placa}</span></td>
                    <td>${o.funcionario||'-'}</td><td>${bs(o.status)}</td>
                    <td style="color:var(--text-muted)">${o.data_entrada}</td>
                    <td><strong>${fmt(o.valor_total)}</strong></td>
                </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">Nenhuma ordem</td></tr>'}</tbody>
                </table>
            </div>
        </div>`;
        toast('✅ Relatório gerado! Clique "Exportar PDF" para salvar.','success');
    }catch(e){toast(e.message,'error');out.innerHTML=`<div style="color:var(--danger);padding:20px">Erro: ${e.message}</div>`;}
}
window.gerarRel=gerarRel;

</script>
</body>
</html>
